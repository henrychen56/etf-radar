async function fsGetList(col) {
  try {
    const snap = await _db.collection(col).orderBy('_ts').get();
    return snap.docs.map(d => ({ _docId: d.id, ...d.data() }));
  } catch (e) { try { const snap2 = await _db.collection(col).get(); return snap2.docs.map(d => ({ _docId: d.id, ...d.data() })); } catch(e2) { return []; } }
}
async function fsAdd(col, data) {
  try { const ref = await _db.collection(col).add({ ...data, _ts: Date.now() }); return ref.id; } catch (e) { return null; }
}
async function fsDel(col, id) {
  try { await _db.collection(col).doc(id).delete(); return true; } catch (e) { return false; }
}
async function fsDelWhere(col, field, val) {
  try {
    const snap = await _db.collection(col).where(field, '==', val).get();
    const batch = _db.batch();
    snap.docs.forEach(d => batch.delete(d.ref));
    await batch.commit();
    return true;
  } catch(e) { return false; }
}

async function getJSON(key, shared, fallback) {
  if (!shared) {
    try { const raw = localStorage.getItem('priv:' + key); return raw ? JSON.parse(raw) : fallback; } catch(e) { return fallback; }
  }
  const list = await fsGetList(key);
  return list.length > 0 ? list : (fallback !== undefined ? fallback : []);
}
async function setJSON(key, value, shared) {
  if (!shared) {
    try { localStorage.setItem('priv:' + key, JSON.stringify(value)); return true; } catch(e) { return false; }
  }
  // 共用資料：批次清除並重寫（用於管理者覆寫清單）
  try {
    const snap = await _db.collection(key).get();
    const batch = _db.batch();
    snap.docs.forEach(d => batch.delete(d.ref));
    if (Array.isArray(value)) {
      value.forEach((item, i) => {
        const docId = item.id ? String(item.id) : (String(Date.now()) + '_' + i);
        batch.set(_db.collection(key).doc(docId), { ...item, _ts: item._ts || Date.now() });
      });
    }
    await batch.commit();
    return true;
  } catch(e) { console.error('setJSON', key, e); return false; }
}
async function deletePrivate(key) {
  try { localStorage.removeItem('priv:' + key); } catch(e) {}
}

function formatDateTime(iso) {
  const d = new Date(iso);
  if (isNaN(d.getTime())) return iso;
  return d.toLocaleDateString('zh-TW', { year: 'numeric', month: 'long', day: 'numeric', weekday: 'short' })
    + '  ' + d.toLocaleTimeString('zh-TW', { hour: '2-digit', minute: '2-digit' });
}

/* ---- 訪客流量統計 ----
   每次「登入後首次進入非部落格頁面」記錄一筆 visit，key = 'visits'（shared storage），
   每筆格式：{ ts: timestamp }
   後台讀取後依日/周/月統計人次（非實名，僅計數）。
   另外每個 session 只記一次（避免換頁重複計算）。
*/
function recordVisit() {
  const sessionKey = '_visited';
  if (sessionStorage.getItem(sessionKey)) return;
  sessionStorage.setItem(sessionKey, '1');
  // 直接新增一筆到 Firestore visits 集合
  fsAdd('visits', { ts: Date.now() });
}

  const [email, setEmail] = useState(profile.email || '');
  const [err, setErr] = useState('');

function useBlogPosts() {
  const [posts, setPosts] = useState(null);
  const [error, setError] = useState(false);
  const cbRef = useRef(null);
  useEffect(() => {
    const cbName = `_blogCb_${Date.now()}`;
    const script = document.createElement('script');
    let done = false;
    const timer = setTimeout(() => { if (!done) { done = true; setError(true); document.head.removeChild(script); } }, 8000);
    window[cbName] = (data) => {
      clearTimeout(timer);
      if (done) return; done = true;
      delete window[cbName];
      try {
        const entries = (data.feed.entry || []).map((e) => ({
          id: e.id.$t,
          title: e.title.$t,
          published: e.published.$t,
          link: (e.link.find((l) => l.rel === 'alternate') || {}).href || BLOG_URL,
          // 保留 HTML 原始內容供渲染，同時保留純文字摘要作備用
          html: (e.content || e.summary || { $t: '' }).$t,
          snippet: (e.summary || e.content || { $t: '' }).$t.replace(/<[^>]+>/g, '').slice(0, 120),
        }));
        setPosts(entries);
      } catch (ex) { setError(true); }
    };
    script.src = `${BLOG_FEED}&max-results=15&callback=${cbName}`;
    script.onerror = () => { clearTimeout(timer); if (!done) { done = true; setError(true); } };
    document.head.appendChild(script);
    return () => { clearTimeout(timer); };
  }, []);
  return { posts, error };
}

function BlogSection() {
  const { posts, error } = useBlogPosts();
  const [page, setPage] = useState(0);
  const perPage = 3;
  let list = [], weekOnly = true;
  if (posts) {
    const weekAgo = Date.now() - 7 * 24 * 60 * 60 * 1000;
    const recent = posts.filter((p) => new Date(p.published).getTime() >= weekAgo);
    if (recent.length > 0) { list = recent; } else { list = posts.slice(0, 6); weekOnly = false; }
  }
  const totalPages = Math.max(1, Math.ceil(list.length / perPage));
  const pageItems = list.slice(page * perPage, page * perPage + perPage);
  return (
    <SectionWrap title="部落格專區" subtitle="第一名操盤日記・每週盤勢觀察與操盤紀錄"
      action={<a href={BLOG_URL} target="_blank" rel="noopener noreferrer" className="text-sm font-mono px-4 py-2 rounded flex items-center gap-1.5" style={{ background: COLORS.brass, color: COLORS.ink }}>

      {posts && list.length > 0 && (
        <>

          <div>{pageItems.map((p) => <PostRow key={p.id} post={p} />)}</div>

              <span style={{ color: COLORS.ink }}>{page + 1} / {totalPages}</span>

                下一頁 <ChevronRight size={16} /></button>
            </div>

      )}
    </SectionWrap>
  );
}

function ExpertAdminForm({ events, onSaved }) {
  const [title, setTitle] = useState('');
  const [speaker, setSpeaker] = useState('');
  const [date, setDate] = useState('');
  const [time, setTime] = useState('');
  const [location, setLocation] = useState('');
  const [feeType, setFeeType] = useState('free');
  const [price, setPrice] = useState('');
  const [capacity, setCapacity] = useState('');
  const [desc, setDesc] = useState('');
  const [regs, setRegs] = useState([]);
  const [expanded, setExpanded] = useState(null);

  useEffect(() => { loadRegs(); }, []);
  async function loadRegs() { setRegs(await getJSON('event-registrations', true, [])); }

  async function addEvent(e) {
    e.preventDefault();
    if (!title.trim() || !date || !time || !location.trim()) return;
    const newEvent = {
      id: `${Date.now()}`, title: title.trim(), speaker: speaker.trim(),
      datetime: `${date}T${time}`, location: location.trim(), feeType,
      price: feeType === 'paid' ? Number(price) || 0 : 0,
      capacity: capacity ? Number(capacity) : null, description: desc.trim(),
    };
    await fsAdd('expert-events', newEvent);
    setTitle(''); setSpeaker(''); setDate(''); setTime(''); setLocation(''); setFeeType('free'); setPrice(''); setCapacity(''); setDesc('');
    onSaved();
  }
  async function removeEvent(id) {
    // 找到該事件的 Firestore 文件 ID 並刪除
    const evDoc = events.find(ev => ev.id === id);
    if (evDoc && evDoc._docId) await fsDel('expert-events', evDoc._docId);
    else await fsDelWhere('expert-events', 'id', id);
    onSaved();
  }

  return (
    <div className="flex flex-col gap-6">
      <div>
        <h4 className="font-display font-bold mb-3" style={{ color: COLORS.ink }}>新增講座場次</h4>

function ToolAdminForm({ tools, onSaved }) {

  async function add(e) {
    e.preventDefault();

/* ============ 後台統計：訪客人次 ============ */
function VisitorStats() {
  const [visits, setVisits] = useState(null);
  useEffect(() => {
    (async () => {
      const list = await getJSON('visits', true, []);
      setVisits(list);
    })();
  }, []);

  if (!visits) return <LoadingRow />;

  const now = Date.now();
  const dayAgo = now - 86400000;
  const weekAgo = now - 7 * 86400000;
  const monthAgo = now - 30 * 86400000;

  const today = visits.filter(v => v.ts > dayAgo).length;
  const week  = visits.filter(v => v.ts > weekAgo).length;
  const month = visits.filter(v => v.ts > monthAgo).length;
  const total = visits.length;

  const stats = [
    { label: '今日', value: today, color: COLORS.forest },
    { label: '本週（7天）', value: week, color: COLORS.brass },
    { label: '本月（30天）', value: month, color: COLORS.stamp },
    { label: '累計（6個月）', value: total, color: COLORS.muted },
  ];

  // 最近30天每天人次
  const dayMap = {};
  for (let i = 29; i >= 0; i--) {
    const d = new Date(now - i * 86400000);
    const key = d.toLocaleDateString('zh-TW', { month: 'numeric', day: 'numeric' });
    dayMap[key] = 0;
  }
  visits.filter(v => v.ts > monthAgo).forEach(v => {
    const key = new Date(v.ts).toLocaleDateString('zh-TW', { month: 'numeric', day: 'numeric' });
    if (key in dayMap) dayMap[key]++;
  });
  const dayLabels = Object.keys(dayMap);
  const dayValues = Object.values(dayMap);
  const maxVal = Math.max(...dayValues, 1);

  return (
    <div className="flex flex-col gap-6">
      <h4 className="font-display font-bold" style={{ color: COLORS.ink }}>登入訪客人次統計（不含部落格公開區）</h4>
      <div className="grid grid-cols-2 md:grid-cols-4 gap-3">
        {stats.map((s) => (
          <div key={s.label} className="rounded p-3 text-center" style={{ border: `1px solid ${COLORS.paperDark}` }}>
            <p className="text-3xl font-display font-black" style={{ color: s.color }}>{s.value}</p>
            <p className="text-xs mt-1" style={{ color: COLORS.muted }}>{s.label}</p>
          </div>
        ))}
      </div>
      <div>
        <p className="text-sm font-medium mb-2" style={{ color: COLORS.ink }}>近 30 天每日人次</p>
        <div className="flex items-end gap-0.5" style={{ height: 80 }}>
          {dayValues.map((v, i) => (
            <div key={i} title={`${dayLabels[i]}：${v} 人`} className="flex-1 rounded-t transition-all"
              style={{ height: `${(v / maxVal) * 100}%`, minHeight: v > 0 ? 4 : 1, background: v > 0 ? COLORS.forest : COLORS.paperDark }} />
          ))}
        </div>
        <div className="flex justify-between text-xs mt-1 font-mono" style={{ color: COLORS.muted }}>
          <span>{dayLabels[0]}</span><span>{dayLabels[14]}</span><span>{dayLabels[29]}</span>
        </div>
      </div>
    </div>
  );
}

/* ============ App ============ */
function App() {
  const [profile, setProfile] = useState(null);
  const [loaded, setLoaded] = useState(false);
  const [tab, setTab] = useState('home');
  const [menuOpen, setMenuOpen] = useState(false);
  const [showAuthGate, setShowAuthGate] = useState(false);

  useEffect(() => {
    (async () => {
      const p = await getJSON('member-profile', false, null);
      setProfile(p);
      setLoaded(true);
    })();
  }, []);

  // 登入後記錄訪客（僅登入區才計入）
  useEffect(() => {
    if (profile) recordVisit();
  }, [profile]);

  // 瀏覽器歷史紀錄：讓手機「返回」鍵在頁面內切換分頁，而不是直接離開網站
  useEffect(() => {
    if (!history.state || !history.state.tab) {
      history.replaceState({ tab: 'home' }, '');
    }
    function onPopState(e) {
      const t = (e.state && e.state.tab) || 'home';
      setTab(t);
      setShowAuthGate(false);
      setMenuOpen(false);
    }
    window.addEventListener('popstate', onPopState);
    return () => window.removeEventListener('popstate', onPopState);
  }, []);

  function navigateTab(t) {
    if (t === '__login__') { setShowAuthGate(true); setMenuOpen(false); return; }
    setTab(t);
    setMenuOpen(false);
    history.pushState({ tab: t }, '');
  }

  async function completeAuth(p) {
    await setJSON('member-profile', p, false);
    setProfile(p);
    setShowAuthGate(false);
    recordVisit();
  }
  async function saveProfile(p) {
    await setJSON('member-profile', p, false);
    setProfile(p);
  }
  async function logout() {
    await deletePrivate('member-profile');
    setProfile(null);
  }
  function requestLogin() { setShowAuthGate(true); }

  if (!loaded) return <LoadingScreen />;

  // 全頁 AuthGate（首次來訪或點登入按鈕）
  if (showAuthGate) return <AuthGate onComplete={completeAuth} onBack={() => setShowAuthGate(false)} />;

  return (
    <div style={{ background: COLORS.ink, minHeight: '100vh' }}>
      <GlobalStyle />
      <Header profile={profile} tab={tab}
        setTab={navigateTab}
        onLogout={logout} menuOpen={menuOpen} setMenuOpen={setMenuOpen} />
      <main>
        {tab === 'home' && <Home setTab={navigateTab} />}
        {tab === 'blog' && <BlogSection />}
        {tab === 'resources' && <ResourcesSection profile={profile} onRequestLogin={requestLogin} onSaveProfile={saveProfile} />}
        {tab === 'experts' && <ExpertsSection profile={profile} onRequestLogin={requestLogin} />}
        {tab === 'tools' && <ToolsSection profile={profile} onRequestLogin={requestLogin} onSaveProfile={saveProfile} />}
        {tab === '__admin__' && <AdminDashboard />}
      </main>
      {/* 隱藏後台入口：Header 右鍵點擊「第一」印章 5 次可進入 */}
      <div style={{ position: 'fixed', bottom: 16, right: 16 }}>
        <AdminShortcut onEnter={() => navigateTab('__admin__')} />
      </div>
      <Footer />
    </div>
  );
}

/* 後台快捷入口：畫面右下角小按鈕點 5 下 */
function AdminShortcut({ onEnter }) {
  const [count, setCount] = useState(0);
  const timer = useRef(null);
  function tap() {
    const next = count + 1;
    if (next >= 5) { setCount(0); onEnter(); return; }
    setCount(next);
    clearTimeout(timer.current);
    timer.current = setTimeout(() => setCount(0), 3000);
  }
  return (
    <button onClick={tap} title="管理者後台"
      className="w-8 h-8 rounded-full flex items-center justify-center opacity-20 hover:opacity-60 transition-opacity"
      style={{ background: COLORS.inkLight }}>
      <BarChart2 size={14} color={COLORS.brass} />
    </button>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
